<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map of Thernn 1899 – Western Esteria</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #14141e; color: #e0d8c8; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

    /* Layout: sidebar + map */
    #app-wrapper { display: flex; width: 100vw; height: 100vh; }
    #sidebar {
      width: 340px; min-width: 340px; height: 100vh; background: rgba(18,18,28,0.98);
      border-right: 1px solid rgba(180,160,120,0.3); display: flex; flex-direction: column;
      z-index: 1001; transition: margin-left 0.3s ease;
      overflow: hidden;
    }
    #sidebar.collapsed { margin-left: -340px; }
    #map { flex: 1; height: 100vh; background: #14141e; }

    /* Sidebar toggle button */
    #sidebarToggle {
      position: fixed; top: 12px; left: 12px; z-index: 1002;
      background: rgba(20,20,30,0.9); border: 1px solid rgba(180,160,120,0.4);
      color: #c8b888; padding: 8px 12px; border-radius: 6px; cursor: pointer;
      font-size: 16px; backdrop-filter: blur(4px); transition: left 0.3s ease;
    }
    #sidebarToggle:hover { border-color: rgba(180,160,120,0.8); }
    body.sidebar-open #sidebarToggle { left: 352px; }

    /* Sidebar header */
    .sidebar-header {
      padding: 16px; border-bottom: 1px solid rgba(180,160,120,0.2);
    }
    .sidebar-header h2 { color: #c8b888; font-size: 18px; letter-spacing: 2px; margin-bottom: 10px; }
    .sidebar-search {
      width: 100%; background: rgba(30,30,45,0.8); border: 1px solid rgba(180,160,120,0.3);
      color: #e0d8c8; padding: 8px 12px; border-radius: 6px; font-size: 14px; outline: none;
    }
    .sidebar-search::placeholder { color: #555; }
    .sidebar-search:focus { border-color: rgba(180,160,120,0.7); }

    /* Sidebar tabs */
    .sidebar-tabs {
      display: flex; flex-wrap: wrap; border-bottom: 1px solid rgba(180,160,120,0.2);
      padding: 6px 8px; gap: 4px;
    }
    .sidebar-tab {
      background: none; border: 1px solid rgba(180,160,120,0.2); color: #888;
      padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
      transition: all 0.15s; white-space: nowrap;
    }
    .sidebar-tab:hover { color: #c8b888; border-color: rgba(180,160,120,0.5); }
    .sidebar-tab.active { background: rgba(180,160,120,0.2); color: #c8b888; border-color: #c8b888; }
    .sidebar-tab .tab-count {
      display: inline-block; background: rgba(180,160,120,0.2); padding: 1px 5px;
      border-radius: 8px; font-size: 10px; margin-left: 4px;
    }

    /* Type visibility toggles row */
    .type-toggles {
      display: flex; flex-wrap: wrap; padding: 8px 12px; gap: 6px;
      border-bottom: 1px solid rgba(180,160,120,0.15);
    }
    .type-toggle {
      display: flex; align-items: center; gap: 4px; cursor: pointer;
      font-size: 11px; padding: 3px 8px; border-radius: 4px;
      border: 1px solid rgba(180,160,120,0.2); transition: all 0.15s;
      user-select: none;
    }
    .type-toggle:hover { border-color: rgba(180,160,120,0.5); }
    .type-toggle.hidden-type { opacity: 0.35; text-decoration: line-through; }
    .type-toggle .toggle-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }

    /* Region toggle row */
    .region-toggles {
      display: flex; flex-wrap: wrap; padding: 6px 12px; gap: 6px;
      border-bottom: 1px solid rgba(180,160,120,0.15);
    }
    .region-toggle {
      display: flex; align-items: center; gap: 4px; cursor: pointer;
      font-size: 11px; padding: 3px 8px; border-radius: 4px;
      border: 1px solid rgba(180,160,120,0.2); transition: all 0.15s;
      user-select: none;
    }
    .region-toggle:hover { border-color: rgba(180,160,120,0.5); }
    .region-toggle.hidden-region { opacity: 0.35; }
    .region-toggle .toggle-swatch {
      width: 10px; height: 10px; border-radius: 2px; display: inline-block;
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* Location list */
    .sidebar-list {
      flex: 1; overflow-y: auto; padding: 4px 0;
    }
    .sidebar-list::-webkit-scrollbar { width: 6px; }
    .sidebar-list::-webkit-scrollbar-track { background: transparent; }
    .sidebar-list::-webkit-scrollbar-thumb { background: rgba(180,160,120,0.3); border-radius: 3px; }

    .loc-item {
      padding: 10px 14px; cursor: pointer; border-bottom: 1px solid rgba(180,160,120,0.08);
      transition: background 0.15s;
    }
    .loc-item:hover { background: rgba(180,160,120,0.1); }
    .loc-item.active { background: rgba(180,160,120,0.15); border-left: 3px solid #c8b888; }
    .loc-item-name {
      font-size: 14px; font-weight: 600; color: #e0d8c8; margin-bottom: 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .loc-item-name img { width: 16px; height: 16px; }
    .loc-item-grid {
      font-family: 'Courier New', monospace; color: #a0c0a0; font-size: 12px;
    }
    .loc-item-desc {
      font-size: 12px; color: #888; margin-top: 3px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .sidebar-footer {
      padding: 8px 14px; border-top: 1px solid rgba(180,160,120,0.2);
      font-size: 11px; color: #555; text-align: center;
    }

    /* Map controls (right side) */
    .map-controls {
      position: fixed; top: 12px; right: 12px; z-index: 1000;
      display: flex; gap: 8px; align-items: center;
    }

    .map-btn {
      background: rgba(20,20,30,0.9); border: 1px solid rgba(180,160,120,0.4);
      color: #c8b888; padding: 8px 14px; border-radius: 6px; cursor: pointer;
      font-size: 13px; backdrop-filter: blur(4px); white-space: nowrap;
    }
    .map-btn:hover { border-color: rgba(180,160,120,0.8); }
    .map-btn.active { background: rgba(180,160,120,0.2); border-color: #c8b888; }

    /* Coordinate display */
    .coord-display {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(20,20,30,0.9); border: 1px solid rgba(180,160,120,0.4);
      color: #e0d8c8; padding: 8px 18px; border-radius: 6px;
      font-family: 'Courier New', monospace; font-size: 15px; letter-spacing: 1px;
      z-index: 1000; pointer-events: none; backdrop-filter: blur(4px);
    }

    /* Popups */
    .leaflet-popup-content-wrapper {
      background: rgba(30,28,40,0.95); color: #e0d8c8;
      border: 1px solid rgba(180,160,120,0.5); border-radius: 6px;
    }
    .leaflet-popup-tip { background: rgba(30,28,40,0.95); }
    .leaflet-popup-content { margin: 10px 14px; font-size: 14px; line-height: 1.5; }
    .leaflet-popup-content h3 {
      color: #c8b888; margin: 0 0 6px; font-size: 16px;
      border-bottom: 1px solid rgba(180,160,120,0.3); padding-bottom: 4px;
    }
    .leaflet-popup-content .grid-ref { font-family: 'Courier New', monospace; color: #a0c0a0; font-size: 13px; }
    .leaflet-popup-content .description { margin-top: 6px; color: #c0b8a8; }

    /* Loading */
    #loading {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #14141e;
      display: flex; align-items: center; justify-content: center;
      z-index: 2000; flex-direction: column; gap: 16px; transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading h1 { color: #c8b888; font-size: 28px; letter-spacing: 3px; }
    #loading p { color: #888; font-size: 14px; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(180,160,120,0.2); border-top-color: #c8b888; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Map marker icons */
    .map-marker-icon {
      filter: drop-shadow(0 0 2px rgba(255,255,255,0.8));
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .map-marker-icon:hover {
      transform: scale(1.3);
      filter: drop-shadow(0 0 6px rgba(255,255,255,1));
    }
    .search-hit {
      transform: scale(1.4) !important;
      filter: drop-shadow(0 0 8px rgba(255,255,255,1)) !important;
    }
    .search-dim { opacity: 0.3; }

    /* Travel Calculator Panel */
    .travel-panel {
      position: fixed; top: 54px; right: 12px; z-index: 1001;
      background: rgba(18,18,28,0.96); border: 1px solid rgba(180,160,120,0.5);
      border-radius: 8px; width: 280px; backdrop-filter: blur(6px);
      display: none; flex-direction: column;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .travel-panel.active { display: flex; }
    .travel-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; border-bottom: 1px solid rgba(180,160,120,0.3);
      color: #c8b888; font-size: 14px; font-weight: 600; letter-spacing: 1px;
    }
    .travel-close {
      background: none; border: none; color: #888; font-size: 20px;
      cursor: pointer; line-height: 1; padding: 0 4px;
    }
    .travel-close:hover { color: #e0d8c8; }
    .travel-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
    .travel-label { font-size: 12px; color: #a09888; }
    .travel-input {
      width: 100%; background: rgba(30,30,45,0.8); border: 1px solid rgba(180,160,120,0.3);
      color: #e0d8c8; padding: 7px 10px; border-radius: 5px; font-size: 14px; outline: none;
      font-family: 'Courier New', monospace;
    }
    .travel-input:focus { border-color: rgba(180,160,120,0.7); }
    .travel-instructions { font-size: 12px; color: #888; font-style: italic; }
    .travel-points { display: flex; flex-direction: column; gap: 6px; }
    .travel-point {
      font-family: 'Courier New', monospace; font-size: 13px; color: #e0d8c8;
      display: flex; align-items: center; gap: 6px;
    }
    .point-label { color: #c8b888; font-weight: bold; min-width: 20px; }
    .point-value { color: #a0c0a0; }
    .travel-result {
      background: rgba(180,160,120,0.1); border: 1px solid rgba(180,160,120,0.25);
      border-radius: 6px; padding: 10px 12px; font-size: 13px; line-height: 1.6;
      color: #e0d8c8; display: none;
    }
    .travel-result.visible { display: block; }
    .travel-result .result-value { color: #c8b888; font-weight: 600; font-family: 'Courier New', monospace; }
    .travel-reset { width: 100%; text-align: center; font-size: 12px; padding: 6px; }

    /* Travel mode markers on map */
    .travel-marker {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid #c8b888; background: rgba(180,160,120,0.6);
      box-shadow: 0 0 8px rgba(200,184,136,0.6);
    }
    .travel-marker.point-a { background: rgba(100,200,100,0.7); border-color: #6c6; }
    .travel-marker.point-b { background: rgba(200,100,100,0.7); border-color: #c66; }
    .travel-line { stroke: #c8b888; stroke-width: 2; stroke-dasharray: 8 6; opacity: 0.8; }

    /* Travel mode cursor */
    .travel-cursor { cursor: crosshair !important; }
    .travel-cursor * { cursor: crosshair !important; }

    /* Grid number labels */
    .grid-label {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      color: #000000;
      text-align: center;
      pointer-events: none;
      text-shadow:
        -1px -1px 0 #fff, 1px -1px 0 #fff,
        -1px  1px 0 #fff, 1px  1px 0 #fff,
        0 0 6px rgba(255,255,255,0.9);
    }
    .grid-label span { white-space: nowrap; }
  </style>
</head>
<body class="sidebar-open">
  <div id="loading">
    <h1>THERNN 1899</h1>
    <div class="spinner"></div>
    <p>Loading map...</p>
  </div>

  <button id="sidebarToggle" title="Toggle sidebar">&#9776;</button>

  <div id="app-wrapper">
    <div id="sidebar">
      <div class="sidebar-header">
        <h2>THERNN 1899</h2>
        <input type="text" class="sidebar-search" id="searchInput" placeholder="Search locations..." />
      </div>
      <div class="sidebar-tabs" id="sidebarTabs"></div>
      <div class="type-toggles" id="typeToggles"></div>
      <div class="region-toggles" id="regionToggles"></div>
      <div class="sidebar-list" id="sidebarList"></div>
      <div class="sidebar-footer" id="sidebarFooter">0 locations</div>
    </div>
    <div id="map"></div>
  </div>

  <div class="coord-display" id="coordDisplay">Square: ---</div>

  <div class="map-controls">
    <button class="map-btn" id="gridToggle">Grid: OFF</button>
    <button class="map-btn" id="regionsToggle">Regions: OFF</button>
    <button class="map-btn" id="travelToggle">Travel</button>
    <a class="map-btn" href="https://barrowsandborderlands.com/pages/campaign-links" target="_blank" rel="noopener" style="text-decoration:none;">Campaign Links</a>
  </div>

  <!-- Travel Distance Calculator Panel -->
  <div class="travel-panel" id="travelPanel">
    <div class="travel-header">
      <span>Travel Calculator</span>
      <button class="travel-close" id="travelClose">&times;</button>
    </div>
    <div class="travel-body">
      <label class="travel-label">Squares per day of movement:</label>
      <input type="number" id="travelSpeed" class="travel-input" value="24" min="1" />
      <div class="travel-instructions" id="travelInstructions">Click two points on the map to measure travel distance.</div>
      <div class="travel-points" id="travelPoints">
        <div class="travel-point" id="travelPointA"><span class="point-label">A:</span> <span class="point-value">—</span></div>
        <div class="travel-point" id="travelPointB"><span class="point-label">B:</span> <span class="point-value">—</span></div>
      </div>
      <div class="travel-result" id="travelResult"></div>
      <button class="travel-reset map-btn" id="travelReset">Reset Points</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
